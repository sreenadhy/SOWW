spring.application.name=sritha-oils-backend

server.port=${PORT:${SERVER_PORT:8080}}
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sritha_oils_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sree@4321}

# IMPORTANT FIXES
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# DISABLE FLYWAY (CAUSE OF YOUR ERROR)
spring.flyway.enabled=false

app.auth.otp-expiry-minutes=2
app.auth.dev-return-otp=${APP_AUTH_DEV_RETURN_OTP:false}
app.jwt.secret=${APP_JWT_SECRET:srithaoils-super-secure-development-jwt-secret-key-2026-backend}
app.jwt.expiration-hours=24

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
