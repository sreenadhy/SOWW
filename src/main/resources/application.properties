spring.application.name=sritha-oils-backend
port=8082
spring.datasource.url=jdbc:h2:mem:srithaoilsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.auth.otp-expiry-minutes=2
app.auth.dev-return-otp=true
app.jwt.secret=srithaoils-super-secure-development-jwt-secret-key-2026-backend
app.jwt.expiration-hours=24
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
