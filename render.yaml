services:
  - type: web
    name: srtha-oils-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: srtha-oils-frontend
    runtime: static
    rootDir: frontend
    buildCommand: bun install && bun run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://srtha-oils-backend.onrender.com
